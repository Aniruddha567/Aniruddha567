name: Metrics

on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: aniruddha567

          template: classic
          base: header, activity, community, repositories

          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_topics: yes
          plugin_stars: yes
          plugin_followup: yes
          plugin_traffic: yes
          plugin_lines: yes
